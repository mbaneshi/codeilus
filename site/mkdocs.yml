site_name: Codeilus
site_url: https://encadeiateia-maker.github.io/codeilus/
site_description: Turn any codebase into an interactive learning experience
repo_url: https://github.com/encadeiateia-maker/codeilus
repo_name: encadeiateia-maker/codeilus

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/favicon.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Guide:
      - How It Works: guide/how-it-works.md
      - Learning Path: guide/learning-path.md
      - Graph Explorer: guide/graph-explorer.md
      - Ask AI: guide/ask-ai.md
      - Static Export: guide/static-export.md
  - Architecture:
      - Overview: architecture/overview.md
      - Crate Map: architecture/crate-map.md
      - Data Flow: architecture/data-flow.md
  - Reference:
      - CLI: reference/cli.md
      - API: reference/api.md
      - MCP Server: reference/mcp.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/codeilus/codeilus
